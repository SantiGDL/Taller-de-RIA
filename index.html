<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://unpkg.com/gridjs/dist/theme/mermaid.min.css" rel="stylesheet" />
    <title>Tarea 2</title>
</head>
<body>
    <!--m = margin, t = top, 4 = tamaño del margen
    
    alert alert-primary es el fondo del div-->

    
<!--Contenedor Principal-->
    <div class="container mt-4">
        <!--Titulo Principal-->
        <div class="container mt-4 
                    alert alert-primary 
                    text-center">
            <h1>RIA - Laboratorio 2</h1>
        </div>
    
    
        
        <!--ACORDEON - Desplega las secciones -->
        <div class="accordion" id="accordionPanelsStayOpenExample">
            <!--Header del acordeon (el boton para desplegarlo)-->
            <div class="accordion-item">
                <h2 class="accordion-header">
                    <button class="accordion-button"
                            type="button" 
                            data-bs-toggle="collapse" 
                            data-bs-target="#newProductSeccion" 
                            aria-expanded="true" 
                            aria-controls="newProductSeccion">
                        New product
                    </button>
                </h2>
                <!--Body del acordeon-->
                <!--El show es el que hace que cuando cargues la pagina ya aparezca la seccion producto-->
                <div id="newProductSeccion" class="accordion-collapse collapse show">
                    <div class="accordion-body">                    
                        <!-- FORMULARIO NEW PRODUCT -->
                        <div>
                            <h3 class="text-center">New product</h3>
                            <form id="formularioProducto">
                                <!--mt-2 es margin-top, o sea un espacio vertical de 2 segun escala de bootstrap
                                    align-items-center centra verticalmente el label respecto al input.-->
                                <!--TITULO-->
                                <div class="row align-items-center mt-2">
                                    <label class="col-4 text-end">Title</label>
                                    <div class ="col-4">
                                        <input class="form-control" type = "text" name="title" required>
                                    </div>
                                </div>
                                
                                <!--PRECIO-->
                                <div class="row align-items-center mt-2">
                                    <label class="col-4 text-end">Price</label>
                                    <div class ="col-4">
                                        <input class="form-control" type = "number" name="price" required>
                                    </div>
                                </div>

                                <!--DESCRIPCION-->
                                <div class="row align-items-center mt-2">
                                    <label class="col-4 text-end">Description</label>
                                    <div class ="col-4">
                                        <input class="form-control" type = "text" name="desc" required>
                                    </div>
                                </div>

                                <!--CATEGORIA-->
                                <div class="row align-items-center mt-2">
                                    <label class="col-4 text-end">Category</label>
                                    <div class ="col-4">
                                        <input class="form-control" type = "text" name="cat" required>
                                    </div>
                                </div>
                                
                                
                                <div class="row mt-2">
                                    <div class="offset-4 col-4 text-end">
                                        <button id="botonSend" type="submit" class="btn btn-primary">Send</button>
                                    </div>
                                </div>

                                <div id="alertaProducto" class="mt-3">
                                    <!--Aca se cargan las alertas, como si hay un error al hacer POST-->
                                </div>
                                
                            </form>
                        </div>                                                          




                        <!-- FIN FORMULARIO NEW PRODUCT-->
                    </div>
                </div>
            </div>

            <!--Header del acordeon 2 - Product List-->
            <div class="accordion-item">
                <h2 class="accordion-header">
                <button class="accordion-button collapsed" 
                        type="button" 
                        data-bs-toggle="collapse" 
                        data-bs-target="#productListSeccion" 
                        aria-expanded="false" 
                        aria-controls="productListSeccion">
                    Product list
                </button>
                </h2>
                <!--BODY del acordeon 2-->
                <!--El id es lo que relaciona el header con el body-->
                <div id="productListSeccion" class="accordion-collapse collapse">
                    <div class="accordion-body">
                        <h3 class="text-center">Product list</h3>

                        <div class="mb-3">
                            <!--A este boton hago referencia en peticionAPI.js-->
                            <button id="botonLoadProductos" class="btn btn-primary">
                                Update
                            </button>
                        </div>

                        <div id="divProductos" class="row g-3">
                            <!-- Acá se van a cargar los productos -->
                        </div>                                              
                    </div>
                </div>
            </div>
        </div>
</div>
    
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/gridjs/dist/gridjs.umd.js"></script>
    <script src="mostrarProductosGridJS.js"></script> <!--Es super importante que esté este antes de peticionApi porque este ultimo utiliza la funcion de mostrarProductosGridJS.js-->
    <script src="Controller.js"></script>
    <script src="validarInputs.js"></script>
    
</body>
</html>
